<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#e94560">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <title>LocalVideoServer</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>LocalVideoServer</h1>
            <div class="controls">
                <label for="searchInput" class="visually-hidden">Search videos</label>
                <input type="text" id="searchInput" placeholder="Search videos..." aria-label="Search videos">
                <button id="searchBtn">Search</button>
                <button id="randomBtn">Random</button>
                <button id="historyBtn">History</button>
                <button id="favoritesBtn">Favorites</button>
                <button id="blacklistBtn">Blacklist</button>
                <button id="allVideosBtn">All Videos</button>
                <button id="settingsBtn" class="settings-btn">⚙</button>
            </div>
        </header>
        
        <main>
            <div id="videoList" class="video-grid"></div>
            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Loading...</p>
            </div>
            <div id="emptyMessage" class="empty" style="display: none;">
                <div class="empty-state">
                    <div class="empty-icon">📁</div>
                    <h3>No videos found</h3>
                    <p>Select a video folder and we’ll scan it for you.</p>
                    <button id="emptySettingsBtn" class="primary">⚙️ Set Video Directory</button>
                </div>
            </div>
        </main>
        
        <div id="videoModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="videoModalTitle">
            <div class="modal-content">
                <button type="button" class="close" aria-label="Close">&times;</button>
                <div class="video-container">
                    <video id="videoPlayer" controls aria-label="Video player"></video>
                </div>
                <div class="video-info">
                    <h2 id="videoModalTitle"></h2>
                    <p id="videoPath"></p>
                    <div class="video-actions">
                        <button id="toggleFavoriteBtn">Add to Favorites</button>
                        <button id="playRandomBtn">Play Random</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="historyModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="historyModalTitle">
            <div class="modal-content">
                <button type="button" class="close" aria-label="Close">&times;</button>
                <h2 id="historyModalTitle">Playback History</h2>
                <div id="historyList"></div>
                <button id="clearHistoryBtn" class="danger">Clear History</button>
            </div>
        </div>

        <div id="favoritesModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="favoritesModalTitle">
            <div class="modal-content">
                <button type="button" class="close" aria-label="Close">&times;</button>
                <h2 id="favoritesModalTitle">Favorites</h2>
                <div id="favoritesList"></div>
            </div>
        </div>

        <div id="blacklistModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="blacklistModalTitle">
            <div class="modal-content">
                <button type="button" class="close" aria-label="Close">&times;</button>
                <h2 id="blacklistModalTitle">Blacklist</h2>
                <div class="blacklist-input">
                    <input type="text" id="blacklistInput" placeholder="Enter directory path..." aria-label="Directory path">
                    <button id="addBlacklistBtn">Add</button>
                </div>
                <div id="blacklistList"></div>
            </div>
        </div>

        <div id="settingsModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="settingsModalTitle">
            <div class="modal-content">
                <button type="button" class="close" aria-label="Close">&times;</button>
                <h2 id="settingsModalTitle">Settings</h2>
                <div class="settings-form">
                    <div class="settings-group">
                        <label for="settingsPort">HTTP Port</label>
                        <input type="number" id="settingsPort" min="1" max="65535" placeholder="8080">
                        <small>Requires restart to take effect</small>
                    </div>
                    <div class="settings-group">
                        <label for="settingsDir">Video Directory</label>
                        <div class="dir-browser">
                            <div class="dir-breadcrumb" id="dirBreadcrumb"></div>
                            <div class="dir-list" id="dirList"></div>
                            <div class="dir-selected">
                                <span>Selected: </span><strong id="dirSelectedPath">None</strong>
                            </div>
                        </div>
                    </div>
                    <div class="settings-actions">
                        <button id="settingsSaveBtn" class="primary">Save & Rescan</button>
                    </div>
                    <div id="settingsStatus" class="settings-status"></div>
                </div>
            </div>
        </div>
        
        <div id="resumeModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="resumeModalTitle">
            <div class="modal-content resume-content">
                <h2 id="resumeModalTitle">Resume playback?</h2>
                <p id="resumeVideoTitle"></p>
                <p id="resumePosition"></p>
                <div class="resume-buttons">
                    <button id="resumeFromBeginning" class="secondary">Play from beginning</button>
                    <button id="resumeFromPosition">Resume</button>
                </div>
            </div>
        </div>
        
        <div id="toastContainer" class="toast-container"></div>
    </div>
    
    <script src="/js/app.js?v=3"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(function() {});
        }
    </script>
</body>
</html>
