name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake sqlite3 libsqlite3-dev
    
    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release
    
    - name: Build
      run: cmake --build build --config Release -j$(nproc)
    
    - name: Run tests (CTest)
      run: |
        cd build
        ctest -j $(nproc) --output-on-failure
    
    - name: Collect Linux files
      run: |
        mkdir -p dist
        cp build/bin/local_video dist/
        echo "## ⚖️ 法律免责声明" > dist/免责声明.txt
        echo "" >> dist/免责声明.txt
        echo "本项目仅供教育和合法用途。用户须自行承担遵守相关法律法规的责任。作者不对任何滥用或非法使用行为承担责任。" >> dist/免责声明.txt

    - name: Upload Linux binary
      uses: actions/upload-artifact@v4
      with:
        name: local_video-linux
        path: dist/

  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-make
          mingw-w64-x86_64-sqlite3
          mingw-w64-x86_64-pkg-config
          mingw-w64-x86_64-ntldd
    
    - name: Build with MSYS2
      shell: msys2 {0}
      run: |
        export PATH="/mingw64/bin:$PATH"
        mkdir -p build && cd build
        cmake .. -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_MAKE_PROGRAM=/mingw64/bin/mingw32-make.exe
        mingw32-make -j$(nproc)
    
    - name: Collect Windows files
      shell: msys2 {0}
      run: |
        mkdir -p dist
        cp build/bin/local_video.exe dist/
        cp -r web dist/
        # Copy all required DLLs (MinGW runtime + sqlite3)
        ntldd -R build/bin/local_video.exe | grep "mingw64" | grep -v "not found" | \
          awk '{print $3}' | sed 's/\\/\//g' | while read dll; do cp "$dll" dist/; done
        echo "@echo off" > dist/start.bat
        echo "local_video.exe --port 8080 --video-dir ./videos" >> dist/start.bat
        # Add disclaimer
        echo "## ⚖️ 法律免责声明" > dist/免责声明.txt
        echo "" >> dist/免责声明.txt
        echo "本项目仅供教育和合法用途。用户须自行承担遵守相关法律法规的责任。作者不对任何滥用或非法使用行为承担责任。" >> dist/免责声明.txt

    - name: Smoke test
      shell: msys2 {0}
      run: |
        cd dist
        # Start server in background
        ./local_video.exe --port 18080 > /tmp/server.log 2>&1 &
        SERVER_PID=$!
        
        # Wait for server to start
        for i in $(seq 1 10); do
          if curl -s -o /dev/null -w "%{http_code}" --max-time 3 http://127.0.0.1:18080/ 2>/dev/null | grep -q "200"; then
            echo "Server is ready"
            break
          fi
          sleep 1
        done
        
        # Test 1: Homepage returns 200 with HTML
        HTTP_CODE=$(curl -s -o /tmp/smoke_body.html -w "%{http_code}" --max-time 5 http://127.0.0.1:18080/)
        echo "Homepage HTTP code: $HTTP_CODE"
        if [ "$HTTP_CODE" != "200" ]; then
          echo "FAIL: Homepage returned $HTTP_CODE"
          echo "--- Response body ---"
          cat /tmp/smoke_body.html 2>/dev/null || echo "(empty)"
          echo "--- Server log ---"
          cat /tmp/server.log
          kill $SERVER_PID 2>/dev/null
          exit 1
        fi
        if ! grep -q "LocalVideoServer" /tmp/smoke_body.html; then
          echo "FAIL: Homepage does not contain expected content"
          cat /tmp/smoke_body.html
          kill $SERVER_PID 2>/dev/null
          exit 1
        fi
        echo "PASS: Homepage OK"
        
        # Test 2: API returns valid JSON
        HTTP_CODE=$(curl -s -o /tmp/smoke_api.json -w "%{http_code}" --max-time 5 http://127.0.0.1:18080/api/videos)
        echo "API HTTP code: $HTTP_CODE"
        if [ "$HTTP_CODE" != "200" ]; then
          echo "FAIL: API returned $HTTP_CODE"
          kill $SERVER_PID 2>/dev/null
          exit 1
        fi
        echo "PASS: API OK"
        
        # Test 3: CSS is served
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:18080/css/style.css)
        echo "CSS HTTP code: $HTTP_CODE"
        if [ "$HTTP_CODE" != "200" ]; then
          echo "FAIL: CSS returned $HTTP_CODE"
          kill $SERVER_PID 2>/dev/null
          exit 1
        fi
        echo "PASS: CSS OK"
        
        # Test 4: JS is served
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:18080/js/app.js)
        echo "JS HTTP code: $HTTP_CODE"
        if [ "$HTTP_CODE" != "200" ]; then
          echo "FAIL: JS returned $HTTP_CODE"
          kill $SERVER_PID 2>/dev/null
          exit 1
        fi
        echo "PASS: JS OK"
        
        echo "All smoke tests passed!"
        kill $SERVER_PID 2>/dev/null
        wait $SERVER_PID 2>/dev/null
        exit 0

    - name: Upload Windows binary
      uses: actions/upload-artifact@v4
      with:
        name: local_video-windows
        path: dist/
