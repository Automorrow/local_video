name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake sqlite3 libsqlite3-dev
    
    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release
    
    - name: Build
      run: cmake --build build --config Release -j$(nproc)
    
    - name: Run tests (CTest)
      run: |
        cd build
        ctest -j $(nproc) --output-on-failure
    
    - name: Collect Linux files
      run: |
        mkdir -p dist
        cp build/bin/local_video dist/
        echo "## ⚖️ 法律免责声明" > dist/免责声明.txt
        echo "" >> dist/免责声明.txt
        echo "本项目仅供教育和合法用途。用户须自行承担遵守相关法律法规的责任。作者不对任何滥用或非法使用行为承担责任。" >> dist/免责声明.txt

    - name: Upload Linux binary
      uses: actions/upload-artifact@v4
      with:
        name: local_video-linux
        path: dist/

  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-make
          mingw-w64-x86_64-sqlite3
          mingw-w64-x86_64-pkg-config
          mingw-w64-x86_64-ntldd
    
    - name: Build with MSYS2
      shell: msys2 {0}
      run: |
        export PATH="/mingw64/bin:$PATH"
        mkdir -p build && cd build
        cmake .. -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_MAKE_PROGRAM=/mingw64/bin/mingw32-make.exe
        mingw32-make -j$(nproc)

    - name: Run unit tests
      shell: msys2 {0}
      run: |
        export PATH="/mingw64/bin:$PATH"
        cd build
        echo "=== Running unit tests ==="
        failed=0
        for test in bin/test_module bin/test_list bin/test_notifier bin/test_log bin/test_thread bin/test_json bin/test_db bin/test_video_scanner; do
          if [ -f "$test" ]; then
            echo "--- Running $(basename $test) ---"
            if ./$test; then
              echo "PASS: $(basename $test)"
            else
              echo "FAIL: $(basename $test)"
              failed=$((failed + 1))
            fi
          else
            echo "SKIP: $(basename $test) not found"
          fi
        done
        echo "=== Test Summary ==="
        if [ $failed -eq 0 ]; then
          echo "All tests passed!"
        else
          echo "$failed test(s) failed!"
          exit 1
        fi
    
    - name: Collect Windows files
      shell: msys2 {0}
      run: |
        mkdir -p dist
        cp build/bin/local_video.exe dist/
        cp -r web dist/
        # Copy all required DLLs (MinGW runtime + sqlite3)
        ntldd -R build/bin/local_video.exe | grep "mingw64" | grep -v "not found" | \
          awk '{print $3}' | sed 's/\\/\//g' | while read dll; do cp "$dll" dist/; done
        echo "@echo off" > dist/start.bat
        echo "local_video.exe --port 8080 --video-dir ./videos" >> dist/start.bat
        # Add disclaimer
        echo "## ⚖️ 法律免责声明" > dist/免责声明.txt
        echo "" >> dist/免责声明.txt
        echo "本项目仅供教育和合法用途。用户须自行承担遵守相关法律法规的责任。作者不对任何滥用或非法使用行为承担责任。" >> dist/免责声明.txt

    - name: Upload Windows binary
      uses: actions/upload-artifact@v4
      with:
        name: local_video-windows
        path: dist/
